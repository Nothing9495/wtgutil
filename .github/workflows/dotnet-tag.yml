name: Build wtgutil (tag push)

on:
  push:
    tag:
      - 'v*.*.*' # Matches tags like v1.0.0, v2.1.3, etc.
      - '*.*.*' # Matches tags like 1.0.0, 2.1.3, etc.

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET SDK (for CLI)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build (Release, x64)
        run: dotnet build ./src/wtgutil.csproj /p:Configuration=Release /p:Platform=x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wtgutil-x64-Release
          path: ./src/bin/x64/Release/