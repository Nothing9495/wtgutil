name: Build wtgutil

on:
  workflow_call:
    inputs:
      upload-artifact:
        type: boolean
        default: true
      upload-tag:
        type: string
        default: "Build-Artifacts"
      version:
        type: string
        default: "latest"
      is-prerelease:
        type: boolean
        default: true

env:
  IS_PRERELEASE: ${{ inputs.is-prerelease }}
  UPLOAD_ARTIFACT: ${{ inputs.upload-artifact }}
  UPLOAD_TAG: ${{ inputs.upload-tag }}
  BUILD_VER: ${{ inputs.version }}

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build x64 and AnyCPU Releases
        run: |
          mkdir ./src/bin/ActionsBuild -Force
          dotnet build ./src/wtgutil.csproj /p:Configuration=Release /p:Platform=x64 /p:AssemblyName=wtgutil-${{ env.BUILD_VER }}-x64 -o ./src/bin/ActionsBuild
          dotnet build ./src/wtgutil.csproj /p:Configuration=Release /p:Platform=AnyCPU /p:AssemblyName=wtgutil-${{ env.BUILD_VER }}-x86_64 -o ./src/bin/ActionsBuild

      - name: Upload artifacts
        if: env.UPLOAD_ARTIFACT == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: wtgutil-Release
          path: ./src/bin/ActionsBuild/wtgutil-*.exe

      - name: Publish to GitHub Releases
        if: env.UPLOAD_ARTIFACT == 'true'
        uses: softprops/action-gh-release@v1
        with:
          prerelease: ${{ env.IS_PRERELEASE }}
          files: ./src/bin/ActionsBuild/wtgutil-*.exe
          tag_name: ${{ env.UPLOAD_TAG }}